<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial GUTIC - Simulador de Penales</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1b4d22; /* Verde oscuro exterior */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .contenedor-juego {
            background-color: #2e7d32; /* Verde cancha */
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        .marcador {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
        }

        .tiros-info {
            font-size: 15px;
            color: #e0e0e0;
            margin-bottom: 20px;
        }

        /* El Arco de Fútbol */
        .arco {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background-color: #ffffff;
            padding: 10px;
            border: 5px solid #000000;
            border-bottom: none; /* Sin red abajo */
            border-radius: 8px 8px 0 0;
            margin: 0 auto 25px auto;
        }

        .zona-btn {
            background-color: #f5f5f5;
            border: 2px solid #ccc;
            padding: 20px 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            color: #333;
        }

        .zona-btn:hover {
            background-color: #e0e0e0;
            transform: scale(1.03);
        }

        .comentarios {
            font-size: 16px;
            font-style: italic;
            color: #ffeb3b; /* Amarillo relator */
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="contenedor-juego">
    <div class="marcador" id="marcador">JUGADOR: 0  |  ARQUERO: 0</div>
    <div class="tiros-info" id="tiros-info">Tiros de la tanda: 0 / 5</div>
    
    <p>¡Elegí a dónde patear el penal!</p>

    <div class="arco">
        <button class="zona-btn" onclick="patearPenal(1)">Arriba Izq</button>
        <button class="zona-btn" onclick="patearPenal(2)">Arriba Centro</button>
        <button class="zona-btn" onclick="patearPenal(3)">Arriba Der</button>
        <button class="zona-btn" onclick="patearPenal(4)">Abajo Izq</button>
        <button class="zona-btn" onclick="patearPenal(5)">Abajo Centro</button>
        <button class="zona-btn" onclick="patearPenal(6)">Abajo Der</button>
    </div>

    <div class="comentarios" id="comentario">¡El partido está por empezar! Mové la pelota.</div>
</div>

<script>
    // Variables de estado del juego
    let golesJugador = 0;
    let golesArquero = 0;
    let tirosTotales = 0;
    let historialJugador = []; // La memoria del arquero (IA)

    const nombresZonas = [
        "", "Arriba Izquierda", "Arriba Centro", "Arriba Derecha",
        "Abajo Izquierda", "Abajo Centro", "Abajo Derecha"
    ];

    // Algoritmo de decisión del arquero
    function calcularDecisionArquero() {
        let tamano = historialJugador.length;

        // Si el jugador repitió el mismo tiro las últimas dos veces consecutivas
        if (tamano >= 2) {
            let ultimoTiro = historialJugador[tamano - 1];
            let penultimoTiro = historialJugador[tamano - 2];

            if (ultimoTiro === penultimoTiro) {
                // El arquero "detecta el patrón" con un 70% de probabilidad
                if (Math.random() < 0.70) {
                    return ultimoTiro;
                }
            }
        }
        // Si no hay un patrón claro, elige una zona al azar (1 al 6)
        return Math.floor(Math.random() * 6) + 1;
    }

    function patearPenal(zonaElegida) {
        tirosTotales++;
        historialJugador.push(zonaElegida);

        let zonaArquero = calcularDecisionArquero();
        let resultado = "";

        // Lógica de juego: ¿Coincide el tiro con la atajada?
        if (zonaElegida === zonaArquero) {
            resultado = `¡ATAJÓ EL ARQUERO! Se tiró a ${nombresZonas[zonaArquero]}.`;
            golesArquero++; // En la tanda, suma punto para el arquero
        } else {
            resultado = `¡GOOOOL! Pateaste a ${nombresZonas[zonaElegida]} y el arquero fue a ${nombresZonas[zonaArquero]}.`;
            golesJugador++;
        }

        // Actualizar la pantalla
        document.getElementById("comentario").innerText = resultado;
        document.getElementById("marcador").innerText = `JUGADOR: ${golesJugador}  |  ARQUERO: ${golesArquero}`;
        document.getElementById("tiros-info").innerText = `Tiros de la tanda: ${tirosTotales} / 5`;

        // Control de fin de partido
        if (tirosTotales >= 5) {
            // Un pequeño delay para que lleguen a leer el último comentario antes de la alerta
            setTimeout(finalizarPartido, 600);
        }
    }

    function finalizarPartido() {
        let mensaje = "";
        if (golesJugador > (5 - golesArquero)) {
            mensaje = `¡Ganaste el Mundial! 🏆\nLograste meter ${golesJugador} goles.`;
        } else if (golesJugador < (5 - golesArquero)) {
            mensaje = `Quedaste eliminado... 😢\nEl algoritmo del arquero te adivinó el juego.`;
        } else {
            mensaje = "¡Empate en los 5 penales! Se define en el próximo partido.";
        }

        alert(mensaje);
        reiniciarJuego();
    }

    function reiniciarJuego() {
        golesJugador = 0;
        golesArquero = 0;
        tirosTotales = 0;
        historialJugador = [];
        document.getElementById("marcador").innerText = "JUGADOR: 0  |  ARQUERO: 0";
        document.getElementById("tiros-info").innerText = "Tiros de la tanda: 0 / 5";
        document.getElementById("comentario").innerText = "¡Nueva tanda iniciada! A patear de nuevo.";
    }
</script>

</body>
</html>
